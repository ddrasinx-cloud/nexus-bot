<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0055;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowDeep">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.15"/>
  <circle cx="200" cy="200" r="130" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.25"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="url(#glow)" stroke-width="0.5" opacity="0.35"/>
  <g filter="url(#neon)">
    <path d="M200 70 L270 185 L330 70 Z" fill="none" stroke="url(#glow)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M200 70 L130 185 L70 70 Z" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M200 330 L270 215 L330 330 Z" fill="none" stroke="url(#glow)" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M200 330 L130 215 L70 330 Z" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
  <g filter="url(#glowDeep)">
    <circle cx="200" cy="200" r="12" fill="url(#glow)" opacity="0.8"/>
    <circle cx="200" cy="200" r="5" fill="#ffffff"/>
  </g>
  <line x1="200" y1="70" x2="200" y2="330" stroke="url(#glow)" stroke-width="1" opacity="0.3"/>
  <line x1="70" y1="200" x2="330" y2="200" stroke="url(#glow)" stroke-width="1" opacity="0.3"/>
  <text x="200" y="370" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="url(#glow)" letter-spacing="8" filter="url(#neon)">NEXUS</text>
</svg>
